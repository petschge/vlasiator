dynamic_timestep = 0
project = Dispersion
ParticlePopulations = proton

[io]
diagnostic_write_interval = 1
write_initial_state = 0

system_write_t_interval = 1
system_write_file_name = bulk
system_write_distribution_stride = 0
system_write_distribution_xline_stride = 0
system_write_distribution_yline_stride = 0
system_write_distribution_zline_stride = 0

[gridbuilder]
x_length = 256
y_length = 1
z_length = 1
x_min = -5.12e8
x_max =  5.12e8
y_min = 0.0
y_max = 4.0e6
z_min = 0.0
z_max = 4.0e6
dt = 4.0
t_max = 4092.0

[boundaries]
periodic_x = yes
periodic_y = yes
periodic_z = yes

[variables]
output = populations_vg_rho
output = fg_b
diagnostic = populations_vg_blocks

[fieldsolver]
ohmHallTerm = 1
maxSubcycles = 40

[loadBalance]
algorithm = RCB
tolerance = 1.05

[proton_vspace]
vx_min = -200000
vx_max = +200000
vy_min = -200000
vy_max = +200000
vz_min = -200000
vz_max = +200000
vx_length = 32
vy_length = 32
vz_length = 32

[proton_sparse]
minValue = 1.0e-14

[Dispersion]
B0 = 1.0e-9
angleXY = 0.0
angleXZ = 0.0
magXPertAbsAmp = 0.0
magYPertAbsAmp = 1.0e-10
magZPertAbsAmp = 1.0e-10
maxwCutoff = 0.0

[proton_Dispersion]
VX0 = 0.0
VY0 = 0.0
VZ0 = 0.0
rho = 1e4
Temperature = 1.0e5
densityPertRelAmp = 0.0
velocityPertAbsAmp = 0.0
